name: Generate Kanban Story Template
on:
  issues:
    types: [opened, labeled]
  workflow_dispatch: # Allows you to trigger this manually via a button

jobs:
  apply-template:
    if: contains(github.event.issue.labels.*.name, 'story-template') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Overwrite Issue Body with Story Template
        uses: actions/github-script@v7
        with:
          script: |
            const template = `### 📋 User Story
            **As a** [type of user]
            **I want** [to perform some action]
            **So that** [I can achieve some goal/value]

            ### 🎯 Acceptance Criteria
            - [ ] **Scenario 1:** Given... When... Then...
            - [ ] **Scenario 2:** Given... When... Then...

            ### 🛠️ Technical Implementation Notes
            - Add technical tasks here

            ### 🧪 Testing Strategy
            - Unit tests needed?
            - Manual verification steps`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || github.event.inputs.issue_number,
              body: template
            });
